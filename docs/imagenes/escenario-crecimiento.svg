<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="40%" stop-color="#1E2740"/>
      <stop offset="78%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#ECC94B"/>
    </linearGradient>
    <radialGradient id="cr-sun" cx="0.18" cy="0.7" r="0.45">
      <stop offset="0%" stop-color="#F0D053" stop-opacity=".95"/>
      <stop offset="45%" stop-color="#ECC94B" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#1E2740" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cr-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2018"/>
      <stop offset="100%" stop-color="#0A0E18"/>
    </linearGradient>
    <linearGradient id="cr-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0D053" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#ECC94B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cr-veh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D4A60"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#cr-sky)"/>
  <!-- Sol amanecer izquierda -->
  <ellipse cx="145" cy="295" rx="260" ry="180" fill="url(#cr-sun)"/>
  <circle cx="145" cy="295" r="55" fill="#F0D053" opacity=".85"/>
  <!-- Cordillera -->
  <path d="M0 310 L80 280 L180 300 L280 270 L380 295 L480 275 L580 300 L700 285 L800 305 L800 340 L0 340 Z" fill="#0F1A2E" opacity=".75"/>
  <!-- Suelo -->
  <rect y="340" width="800" height="160" fill="url(#cr-floor)"/>
  <!-- Líneas piso saliendo -->
  <g opacity=".22" stroke="#ECC94B" stroke-width="1.5" fill="none">
    <path d="M50 500 Q 250 410 500 345"/>
    <path d="M200 500 Q 350 420 550 350"/>
    <path d="M450 500 Q 500 440 600 360"/>
  </g>

  <!-- Vehículos saliendo en formación (movimiento derecha) — escala creciente para sugerir velocidad/momentum -->
  <!-- Pickup atrás -->
  <g transform="translate(380 310)" opacity=".55">
    <path d="M0 30 L14 20 L60 20 L72 24 L120 24 L130 28 L170 28 L170 45 L0 45 Z" fill="url(#cr-veh)"/>
    <path d="M27 20 L40 10 L95 10 L107 20 Z" fill="#2D3748"/>
    <circle cx="35" cy="46" r="8" fill="#0A0E18"/>
    <circle cx="145" cy="46" r="8" fill="#0A0E18"/>
  </g>
  <!-- Van medio -->
  <g transform="translate(440 330)" opacity=".7">
    <path d="M0 40 L0 15 L32 6 L195 6 L212 18 L240 22 L240 60 L0 60 Z" fill="url(#cr-veh)"/>
    <rect x="14" y="16" width="185" height="18" fill="#1A2540" opacity=".8"/>
    <path d="M0 40 L0 15 L32 6 L195 6 L212 18 L240 22 L240 45 L0 45 Z" fill="url(#cr-light)" opacity=".5"/>
    <circle cx="43" cy="60" r="11" fill="#0A0E18"/>
    <circle cx="195" cy="60" r="11" fill="#0A0E18"/>
  </g>
  <!-- Pickup frente — grande con golden light fuerte -->
  <g transform="translate(530 355)">
    <ellipse cx="155" cy="100" rx="180" ry="7" fill="#000" opacity=".4"/>
    <path d="M0 50 L24 32 L82 28 L108 34 L175 34 L200 40 L295 40 L300 65 L0 65 Z" fill="#2D3748"/>
    <path d="M50 32 L72 14 L165 14 L182 32 Z" fill="#3D4A60"/>
    <path d="M58 28 L75 18 L160 18 L178 28 Z" fill="#1A2540" opacity=".85"/>
    <rect x="182" y="22" width="118" height="20" fill="#1E2740"/>
    <!-- Golden light desde izquierda (sol amanecer) -->
    <path d="M0 50 L24 32 L82 28 L108 34 L175 34 L200 40 L295 40 L300 60 L0 60 Z" fill="url(#cr-light)" opacity=".95"/>
    <circle cx="55" cy="68" r="14" fill="#0A0E18"/>
    <circle cx="248" cy="68" r="14" fill="#0A0E18"/>
    <circle cx="55" cy="68" r="6" fill="#1A2540"/>
    <circle cx="248" cy="68" r="6" fill="#1A2540"/>
  </g>
  <!-- Líneas movimiento sutiles -->
  <g opacity=".25" stroke="#F0D053" stroke-width="1" fill="none">
    <path d="M280 400 L380 395"/>
    <path d="M250 420 L370 412"/>
    <path d="M310 380 L400 376"/>
  </g>
</svg>
