<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="op-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="55%" stop-color="#1E2740"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="op-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#070C18"/>
    </linearGradient>
    <linearGradient id="op-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ECC94B" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ECC94B" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#F0D053" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="op-vehicle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D4A60"/>
      <stop offset="100%" stop-color="#1E2740"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#op-sky)"/>
  <rect y="320" width="800" height="180" fill="url(#op-floor)"/>
  <!-- Líneas piso perspectiva -->
  <g opacity=".15" stroke="#ECC94B" stroke-width="1" fill="none">
    <path d="M-100 500 Q 200 380 800 320"/>
    <path d="M100 500 Q 350 390 800 335"/>
    <path d="M400 500 Q 550 410 800 360"/>
  </g>
  <!-- Halo gold derecha -->
  <ellipse cx="700" cy="290" rx="280" ry="120" fill="url(#op-gold)" opacity=".35"/>

  <!-- Vehículo 1: pickup (atrás-izquierda) -->
  <g transform="translate(140 280)" opacity=".7">
    <path d="M0 40 L18 25 L75 25 L90 30 L150 30 L165 35 L220 35 L220 60 L0 60 Z" fill="url(#op-vehicle)"/>
    <path d="M35 25 L52 12 L120 12 L135 25 Z" fill="#3D4A60"/>
    <rect x="135" y="20" width="85" height="15" fill="#2D3748"/>
    <circle cx="45" cy="60" r="11" fill="#0A0E18"/>
    <circle cx="185" cy="60" r="11" fill="#0A0E18"/>
  </g>
  <!-- Vehículo 2: van comercial (centro) -->
  <g transform="translate(310 295)" opacity=".82">
    <path d="M0 50 L0 18 L40 8 L235 8 L255 22 L285 26 L285 75 L0 75 Z" fill="url(#op-vehicle)"/>
    <rect x="18" y="20" width="220" height="22" fill="#1A2540" opacity=".85"/>
    <circle cx="52" cy="75" r="13" fill="#0A0E18"/>
    <circle cx="235" cy="75" r="13" fill="#0A0E18"/>
  </g>
  <!-- Vehículo 3: SUV (frente-derecha, dominante con gold) -->
  <g transform="translate(540 320)">
    <ellipse cx="160" cy="105" rx="200" ry="8" fill="#000" opacity=".4"/>
    <path d="M0 55 L18 32 L60 22 L78 8 L185 8 L205 22 L245 30 L260 55 L260 80 L0 80 Z" fill="#2D3748"/>
    <path d="M65 24 L82 12 L182 12 L200 24 Z" fill="#1A2540" opacity=".85"/>
    <!-- Highlight gold (golden hour) -->
    <path d="M0 55 L18 32 L60 22 L78 8 L185 8 L205 22 L245 30 L260 55 L260 68 L0 68 Z" fill="url(#op-gold)" opacity=".85"/>
    <circle cx="55" cy="83" r="15" fill="#0A0E18"/>
    <circle cx="215" cy="83" r="15" fill="#0A0E18"/>
    <circle cx="55" cy="83" r="7" fill="#1A2540"/>
    <circle cx="215" cy="83" r="7" fill="#1A2540"/>
  </g>
  <!-- Líneas atmósfera -->
  <path d="M0 305 Q 400 295 800 305" stroke="#ECC94B" stroke-opacity=".18" stroke-width="1" fill="none"/>
</svg>
